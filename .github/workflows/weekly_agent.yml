name: Baby Sleep Content Agent — Weekly Run (FREE)

on:
  # Every Monday 6:00am Singapore Time (SGT = UTC+8 → 10pm Sunday UTC)
  schedule:
    - cron: '0 22 * * 0'

  # Manual trigger available anytime from Actions tab
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. Install Python packages ─────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4. Install Playwright + Chromium browser ───────────────────────
      #    GitHub Actions includes Chromium — this just links Playwright to it
      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      # ── 5. Run the agent ───────────────────────────────────────────────
      #    Secrets: repo → Settings → Secrets and variables → Actions
      #    Required secrets:
      #      GEMINI_API_KEY     → aistudio.google.com (free)
      #      GOOGLE_API_KEY     → console.cloud.google.com (free)
      #      GOOGLE_CSE_ID      → cse.google.com (free)
      - name: Run baby sleep agent
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
        run: python agent.py

      # ── 6. Commit updated dashboard JSON ──────────────────────────────
      - name: Commit updated report to repo
        run: |
          git config --local user.email "agent@mybelovedsleep.com"
          git config --local user.name  "Baby Sleep Agent Bot"
          git add dashboard/report_latest.json dashboard/report_*.json || true
          git diff --staged --quiet || git commit -m "📊 Weekly report — $(date '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Save report as downloadable artifact ────────────────────────
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_number }}
          path: dashboard/report_latest.json
          retention-days: 90
