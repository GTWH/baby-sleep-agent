name: Baby Sleep Content Agent — Weekly Run (FREE)

on:
  schedule:
    - cron: '0 22 * * 0'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      # Required secrets: GEMINI_API_KEY (aistudio.google.com) + SERPER_API_KEY (serper.dev)
      - name: Run baby sleep agent
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          SERPER_API_KEY:  ${{ secrets.SERPER_API_KEY }}
        run: python agent.py

      - name: Commit updated report to repo
        run: |
          git config --local user.email "agent@mybelovedsleep.com"
          git config --local user.name  "Baby Sleep Agent Bot"
          git add dashboard/report_latest.json dashboard/report_*.json || true
          git diff --staged --quiet || git commit -m "📊 Weekly report — $(date '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_number }}
          path: dashboard/report_latest.json
          retention-days: 90
